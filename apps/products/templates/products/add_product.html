{% extends 'base.html' %}

{% block title %} Add Product {% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-lg-3 mb-4">
            <div class="card border-0 shadow-sm rounded-4 p-3">
                <h5 class="fw-bold mb-4 px-2">Seller Menu</h5>
                <div class="list-group list-group-flush">
                    <a href="{% url 'dashboard' %}" class="list-group-item list-group-item-action border-0 py-3 rounded-3">
                        Dashboard
                    </a>
                    <a href="{% url 'product_list' %}" class="list-group-item list-group-item-action border-0 py-3 rounded-3">
                        My Products
                    </a>
                    <hr class="my-2">
                    <a href="{% url 'view_profile' %}" class="list-group-item list-group-item-action border-0 py-3 rounded-3">
                        My Profile
                    </a>
                    <form method="post" action="{% url 'logout' %}" class="mt-2">
                        {% csrf_token %}
                        <button type="submit" class="list-group-item list-group-item-action border-0 py-3 rounded-3 text-danger w-100 text-start bg-transparent">
                            Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h3 class="fw-bold mb-0">Add New Product</h3>
                    <p class="text-muted small">List a new product for sale in your store.</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Product Title</label>
                                <input type="text" class="form-control rounded-3" name="title" placeholder="e.g. Wireless Headphones" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">Category</label>
                                <select class="form-select rounded-3 py-2 px-3" name="product_category" required>
                                    <option value="">Select Category</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Price ($)</label>
                                <input type="number" step="0.01" class="form-control rounded-3" name="price" placeholder="0.00" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" class="form-control rounded-3" name="stock" placeholder="0" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">Product Image</label>
                                <input type="file" class="form-control rounded-3" name="image" accept="image/*" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control rounded-3" name="description" rows="4" placeholder="Describe your product in detail..."></textarea>
                            </div>

                            <div class="col-12">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" name="is_available" id="is_available" checked>
                                    <label class="form-check-label" for="is_available">Available for purchase</label>
                                </div>
                            </div>
                            
                            <div class="col-12 mt-4">
                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <a href="{% url 'product_list' %}" class="btn btn-light px-4 rounded-pill">Cancel</a>
                                    <button type="submit" class="btn btn-dark px-5 rounded-pill">Add Product</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
