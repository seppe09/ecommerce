{% extends "base.html" %}

{% block title %}Registeration{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card border-0 shadow rounded-4 p-4">
        <div class="text-center">
          <h1 class="fw-bold fs-2 mb-2">
            Create Account
          </h1>
          <p class="text-muted fs-6">
            Create your account to get started
          </p>
        </div>
        <form method="POST">
          {% csrf_token %}
          <!-- Seller Type -->
          <div class="col-md-12 mb-3">
            <label class="form-label fw-semibold d-block">Are you going to sell products?</label>
            <div class="d-flex gap-4 mt-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="seller_type" id="seller_yes" value="True">
                <label class="form-check-label" for="seller_yes">Yes</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="seller_type" id="seller_no" value="False" checked>
                <label class="form-check-label" for="seller_no">No</label>
              </div>
            </div>
          </div>
          <!-- First Name -->
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">
                First Name
              </label>
              <input type="text" class="form-control rounded-3" name="first_name" placeholder="John"
                required>
            </div>
            <!-- Middle Name -->
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">
                Middle Name
              </label>
              <input type="text" class="form-control rounded-3" name="middle_name" placeholder="Doe" required>
            </div>
            <!-- Last Name -->
            <div class="col-md-4 mb-3">
              <label class="form-label fw-semibold">
                Last Name
              </label>
              <input type="text" class="form-control rounded-3" name="last_name" placeholder="Doe"
                required>
            </div>
          </div>
          <div class="row">
            <!-- Username -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">
                Username
              </label>
              <input type="text" class="form-control rounded-3" name="username" placeholder="johndoe123"
                required>
            </div>
            <!-- Email -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">
                Email
              </label>
              <input type="email" class="form-control rounded-3" name="email"
                placeholder="john@example.com" required>
            </div>
          </div>
          <div class="row">
            <!-- Password -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">
                Password
              </label>
              <input type="password" class="form-control rounded-3" name="password" placeholder="••••••••"
                required>
            </div>
            <!-- Confirm Password -->
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">
                Confirm Password
              </label>
              <input type="password" class="form-control rounded-3" name="confirm_password"
                placeholder="••••••••" required>
            </div>
          </div>
          <!-- Button -->
          <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3">
            Sign Up
          </button>
          <!-- Login -->
          <div class="text-center mt-2">
            <small class="text-muted">
              Already have an account?
              <a href="{% url 'login' %}" class="text-dark fw-semibold text-decoration-none">
                Login here
              </a>
            </small>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
