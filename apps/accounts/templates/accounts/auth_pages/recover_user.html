{% extends "base.html" %}

{% block title %}Recover Account{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card border-0 shadow rounded-4 p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-light d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="bi bi-person-check text-dark" viewBox="0 0 16 16">
                            <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm1.679-4.493-1.335 2.226a.75.75 0 0 1-1.174.144l-.774-.773a.5.5 0 0 1 .708-.708l.547.548 1.17-1.951a.5.5 0 1 1 .858.514ZM11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                            <path d="M8.256 14a4.474 4.474 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10c.26 0 .507.009.74.025.226-.341.496-.65.804-.918C9.077 9.038 8.564 9 8 9c-5 0-6 3-6 4s1 1 1 1h5.256Z"/>
                        </svg>
                    </div>
                    <h2 class="fw-bold text-dark mb-1">Recover Account</h2>
                    <p class="text-muted small">Enter your details to reactivate your account.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control rounded-3" name="username" placeholder="johndoe123" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control rounded-3" name="email" placeholder="email@example.com" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control rounded-3" name="password" placeholder="••••••••" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3 mb-3">
                        Recover My Account
                    </button>

                    <div class="text-center">
                        <small class="text-muted">
                            Remember your account? 
                            <a href="{% url 'login' %}" class="text-dark fw-semibold text-decoration-none">Login here</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
