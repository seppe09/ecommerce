{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card border-0 shadow rounded-4 p-4">
        <div class="text-center mb-4">
          <h1 class="fw-bold fs-2 mb-2">
            Login
          </h1>
        </div>
        <form method="POST">
          {% csrf_token %}
          <!-- Username -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Username
            </label>
            <input type="text" class="form-control rounded-3" name="username" placeholder="johndoe123"
              required>
          </div>
          <!-- Password -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              Password
            </label>
            <input type="password" class="form-control rounded-3" name="password" placeholder="••••••••"
              required>
          </div>
          <!-- Button -->
          <button type="submit" class="btn btn-dark btn-lg w-100 rounded-3">
            Login
          </button>

          <div class="text-center mt-3">
            <p class="mb-1 small">
              <span class="text-muted">Don't have an account?</span>
              <a href="{% url 'register' %}" class="text-dark fw-semibold text-decoration-none">Create here</a>
            </p>
            <p class="mb-0 small">
              <span class="text-muted">Deactivated your account?</span>
              <a href="{% url 'recover_user' %}" class="text-dark fw-semibold text-decoration-none">Recover here</a>
            </p>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
